[package]
name = "anon"
version = "0.1.0"
edition = "2021"
description = "Fast CLI tool to anonymize PII in debug data"
license = "MIT"

[dependencies]
clap = { version = "4", features = ["derive"] }
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
colored = "2"

[profile.release]
lto = true
codegen-units = 1
strip = true
