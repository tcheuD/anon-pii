[package]
name = "anon"
version = "0.1.0"
edition = "2021"
description = "Fast CLI tool to anonymize PII in debug data"
license = "MIT"

[dependencies]
clap = { version = "4", features = ["derive"] }
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
colored = "2"
dirs = "6"
unicode-normalization = "0.1"

# Proxy mode dependencies
tokio = { version = "1", features = ["full"] }
axum = "0.8"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream"] }
futures = "0.3"
bytes = "1"

# NER (ML-based) — behind "ner" feature
ort = { version = "2.0.0-rc.11", features = ["load-dynamic"], optional = true }
tokenizers = { version = "0.21", optional = true, default-features = false, features = ["fancy-regex"] }
ndarray = { version = "0.16", optional = true }
ureq = { version = "2", optional = true }
sha2 = { version = "0.10", optional = true }

[features]
default = []
ner = ["dep:ort", "dep:tokenizers", "dep:ndarray", "dep:ureq", "dep:sha2"]
ner-lite = []

[profile.release]
lto = true
codegen-units = 1
strip = true
