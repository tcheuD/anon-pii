# Benchmark Workflow for anon-pii
# Issues: #8, #9, #28
name: Benchmark

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          prefix-key: v1-bench

      - name: Build release variants
        run: |
          cargo build --release
          cp target/release/anon target/release/anon-default 2>/dev/null || echo "Binary not found, skipping"
          cargo build --release --features ner-lite
          cp target/release/anon target/release/anon-ner-lite 2>/dev/null || echo "Binary not found, skipping"

      - name: Run benchmark
        run: |
          # Simple benchmark: process 10k lines and measure time
          python3 -c "
          import subprocess
          import time
          import json
          import sys

          test_input = 'User john.doe@example.com from 192.168.1.1 called\n' * 10000

          results = []
          for name, binary in [('default', 'target/release/anon-default'), ('ner-lite', 'target/release/anon-ner-lite')]:
              try:
                  start = time.perf_counter()
                  proc = subprocess.run([binary], input=test_input, capture_output=True, text=True, timeout=60)
                  elapsed = time.perf_counter() - start
                  results.append({
                      'name': name,
                      'value': elapsed,
                      'unit': 'sec'
                  })
                  print(f'{name}: {elapsed:.3f}s ({10000/elapsed:.0f} lines/s)')
              except Exception as e:
                  print(f'{name}: Error - {e}', file=sys.stderr)

          with open('bench-results.json', 'w') as f:
              json.dump(results, f, indent=2)
          "

      - name: Upload results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmark-results
          path: bench-results.json

      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git switch --orphan gh-pages
            git commit --allow-empty -m "Initialize gh-pages for benchmarks"
            git push origin gh-pages
            git checkout main
          fi

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@a7bc2366eda11037936ea57d811a43b3418d3073 # v1.21.0
        with:
          tool: customSmallerIsBetter
          output-file-path: bench-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '120%'
          comment-on-alert: true
          fail-on-alert: false
