# CI Workflow for anon-pii
# Issues: #1, #2, #3, #4, #28, #29, #34
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Rust Format Check
  # ============================================================================
  rust-fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  # ============================================================================
  # Rust Clippy Lint
  # ============================================================================
  rust-clippy:
    name: Rust Clippy
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          prefix-key: v1-clippy

      - name: Clippy (default features)
        run: cargo clippy -- -D warnings

      - name: Clippy (all features except ner)
        run: cargo clippy --features ner-lite,proxy -- -D warnings

  # ============================================================================
  # Rust Tests (ubuntu — always, macOS — main only)
  # ============================================================================
  rust-test:
    name: Rust Test (${{ matrix.features || 'default' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: ['', 'ner-lite,proxy']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          prefix-key: v1-test
          shared-key: ${{ matrix.features || 'default' }}

      - name: Run tests
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo test --features "${{ matrix.features }}"
          else
            cargo test
          fi

  rust-test-macos:
    name: Rust Test macOS (${{ matrix.features || 'default' }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        features: ['', 'ner-lite,proxy']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          prefix-key: v1-test
          shared-key: ${{ matrix.features || 'default' }}

      - name: Run tests
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo test --features "${{ matrix.features }}"
          else
            cargo test
          fi

  # ============================================================================
  # Rust Build (ubuntu — always, macOS — main only)
  # ============================================================================
  rust-build:
    name: Rust Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          prefix-key: v1-build

      - name: Build release
        run: cargo build --release

  rust-build-macos:
    name: Rust Build macOS
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          prefix-key: v1-build

      - name: Build release
        run: cargo build --release

  # ============================================================================
  # Security: cargo-deny
  # ============================================================================
  security-deny:
    name: Security (cargo-deny)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cargo-deny
        uses: taiki-e/install-action@288875dd3d64326724fa6d9593062d9f8ba0b131 # v2.67.30
        with:
          tool: cargo-deny

      - name: Check advisories
        run: cargo deny check advisories

      - name: Check licenses
        run: cargo deny check licenses

      - name: Check bans
        run: cargo deny check bans

      - name: Check sources
        run: cargo deny check sources

  # ============================================================================
  # Security: cargo-audit
  # ============================================================================
  security-audit:
    name: Security (cargo-audit)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cargo-audit
        run: |
          curl -sSL https://github.com/rustsec/rustsec/releases/download/cargo-audit%2Fv0.22.1/cargo-audit-x86_64-unknown-linux-gnu-v0.22.1.tgz | tar xz --strip-components=1
          mv cargo-audit /usr/local/bin/

      - name: Run audit
        run: cargo-audit audit

  # ============================================================================
  # Summary Gate
  # ============================================================================
  ci-success:
    name: CI Success
    needs:
      - rust-fmt
      - rust-clippy
      - rust-test
      - rust-test-macos
      - rust-build
      - rust-build-macos
      - security-deny
      - security-audit
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          # Always required
          for job in rust-fmt rust-test rust-build; do
            result="${{ needs.rust-fmt.result }}"
            case "$job" in
              rust-test) result="${{ needs.rust-test.result }}" ;;
              rust-build) result="${{ needs.rust-build.result }}" ;;
            esac
            if [[ "$result" != "success" ]]; then
              echo "Required job $job failed: $result"
              exit 1
            fi
          done
          # May be skipped (main-only or dependabot-skip)
          for result in "${{ needs.rust-clippy.result }}" \
                        "${{ needs.security-deny.result }}" \
                        "${{ needs.security-audit.result }}" \
                        "${{ needs.rust-test-macos.result }}" \
                        "${{ needs.rust-build-macos.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Optional job failed: $result"
              exit 1
            fi
          done
          echo "All CI jobs passed!"
