# Release Workflow for anon-pii
# Issues: #5, #6, #11, #28
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # Reject invalid tags before starting expensive test and build jobs.
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch main
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

      - name: Validate tag provenance and version
        run: ./scripts/release-preflight.sh "${GITHUB_REF_NAME}" "${GITHUB_SHA}" refs/remotes/origin/main

  # Re-run the required portable CI checks at the tagged commit. This avoids a
  # race where a tag is pushed before the main-branch CI run has completed.
  verify:
    name: Release Verification
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: v1-release-verify

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: |
          cargo clippy --locked -- -D warnings
          cargo clippy --locked --features ner-lite,proxy -- -D warnings

      - name: Run required tests
        run: |
          cargo test --locked
          cargo test --locked --features ner-lite,proxy
          cargo test --locked --features xlsx
          cargo test --locked --features pdf

      - name: Verify crate package
        run: cargo package --locked

  msrv:
    name: Release MSRV (1.88)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust 1.88
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: v1-release-msrv

      - name: Check supported feature set
        run: cargo check --locked --all-targets --features ner-lite,proxy,pdf,xlsx

  # ============================================================================
  # Build Binaries
  # ============================================================================
  build:
    name: Build (${{ matrix.target }})
    needs: [verify, msrv]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: anon-pii-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: anon-pii-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: anon-pii-macos-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }} --features ner-lite,proxy,pdf

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/anon-pii dist/
          cp README.md LICENSE dist/ 2>/dev/null || true
          cd dist && tar -czvf ../${{ matrix.artifact }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ============================================================================
  # Create Release
  # ============================================================================
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Setup Rust (for cargo-sbom)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-sbom
        uses: taiki-e/install-action@787505cde8a44ea468a00478fe52baf23b15bccd # v2.75.21
        with:
          tool: cargo-sbom

      - name: Generate SBOM (SPDX)
        run: cargo-sbom > anon-${{ github.ref_name }}.spdx.json

      - name: Generate SBOM (CycloneDX)
        run: cargo-sbom --output-format=cyclone_dx_json_1_5 > anon-${{ github.ref_name }}.cdx.json

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: cliff.toml
          args: --latest --strip header
        continue-on-error: true

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body: ${{ steps.changelog.outputs.content || 'Release ${{ github.ref_name }}' }}
          files: |
            artifacts/**/*.tar.gz
            anon-${{ github.ref_name }}.spdx.json
            anon-${{ github.ref_name }}.cdx.json
          generate_release_notes: true
