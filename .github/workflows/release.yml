# Release Workflow for anon-pii
# Issues: #5, #6, #11, #28
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ============================================================================
  # Build Binaries
  # ============================================================================
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: anon-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: anon-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: anon-macos-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/anon dist/ 2>/dev/null || true
          cp README.md LICENSE dist/ 2>/dev/null || true
          cd dist && tar -czvf ../${{ matrix.artifact }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ============================================================================
  # Create Release
  # ============================================================================
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts

      - name: Setup Rust (for cargo-sbom)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-sbom
        uses: taiki-e/install-action@cfdb446e391c69574ebc316dfb7d7849ec12b940 # v2.68.8
        with:
          tool: cargo-sbom

      - name: Generate SBOM (SPDX)
        run: cargo-sbom > anon-${{ github.ref_name }}.spdx.json

      - name: Generate SBOM (CycloneDX)
        run: cargo-sbom --output-format=cyclone_dx_json_1_5 > anon-${{ github.ref_name }}.cdx.json

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: cliff.toml
          args: --latest --strip header
        continue-on-error: true

      - name: Create release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          body: ${{ steps.changelog.outputs.content || 'Release ${{ github.ref_name }}' }}
          files: |
            artifacts/**/*.tar.gz
            anon-${{ github.ref_name }}.spdx.json
            anon-${{ github.ref_name }}.cdx.json
          generate_release_notes: true
