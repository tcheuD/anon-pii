[advisories]
ignore = []

[licenses]
# Keep this list limited to licenses present in the checked dependency graph so
# newly introduced licenses require an explicit review.
allow = [
    "MIT",
    "Apache-2.0",
    "Unlicense",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
